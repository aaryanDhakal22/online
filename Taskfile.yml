version: '3'

vars:
  DEV_COFIG: ./docker/docker-compose.dev.yml
  PROD_CONFIG: ./docker/docker-compose.prod.yml
  ENV_FILE: .env

tasks:
  default:
    desc: Print a greeting message
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  devup:
    desc: Start the development environment
    cmds:
      - docker compose -f {{.DEV_COFIG}} --env-file {{.ENV_FILE}} up 

  devdown:
    desc: Stop the development environment
    cmds:
      - docker compose -f {{.DEV_COFIG}} --env-file {{.ENV_FILE}} down

  devupd:
    desc: Start the development environment in detached mode
    cmds:
      - docker compose -f {{.DEV_COFIG}} --env-file {{.ENV_FILE}} up -d

  devrestart:
    desc: Restart the development environment
    cmds:
      - docker compose -f {{.DEV_COFIG}} --env-file {{.ENV_FILE}} down
      - docker compose -f {{.DEV_COFIG}} --env-file {{.ENV_FILE}} up 

  devreset:
    desc: Reset the development environment
    cmds:
      - docker compose -f {{.DEV_COFIG}} --env-file {{.ENV_FILE}} down
      - docker compose -f {{.DEV_COFIG}} down --rmi all
      - docker compose -f {{.DEV_COFIG}} --env-file {{.ENV_FILE}} up --build

