services:
  api:
    image: ghcr.io/quiccpos/online-api:latest
    env_file:
      - .env
    container_name: quicc_online_backend
    restart: always
    ports:
      - "1323:1323"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/quiccpos/online-frontend:latest
    container_name: quicc_online_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api 

  redis:
    container_name: quicc_online_redis
    restart: always
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${REDIS_PORT}:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASS}"]
