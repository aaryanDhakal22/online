services:
  api:
    env_file:
      - ../.env
    container_name: quicc_online_backend
    build:
      context: ../backend
      target: dev
    restart: always
    volumes:
      - ../backend:/src
      - ~/.aws:/root/.aws:ro
      - sqlite_data:/data
    ports:
      - "1323:1323"
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: quicc_reverse_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend:/usr/share/nginx/html

  redis:
    container_name: quicc_online_redis
    restart: always
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${REDIS_PORT}:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASS}"]

volumes:
  sqlite_data:
